<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio - Diseño de Interfaces</title>
    <style>
        /* ========================
           ESTILOS (CSS)
           ======================== */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Estilos del encabezado con tus datos */
        header {
            background-color: #2c3e50;
            color: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            width: 100%;
            max-width: 700px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 40px;
        }

        h1 { font-size: 28px; margin: 0 0 10px 0; color: #ecf0f1; }
        h2 { font-size: 22px; margin: 0 0 10px 0; color: #1abc9c; }
        h3 { font-size: 18px; margin: 0; font-weight: 300; color: #bdc3c7; }

        /* Contenedor principal de las cajas */
        .drag-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            width: 100%;
            max-width: 700px;
        }

        /* Estilos de las cajas (Origen y Destino) */
        .box {
            width: 250px;
            height: 300px;
            background-color: white;
            border: 3px dashed #bdc3c7;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
            transition: all 0.3s ease;
        }

        .box h4 {
            margin: 0 0 20px 0;
            color: #7f8c8d;
            font-size: 20px;
        }

        /* Efecto cuando pasas la imagen por encima de una caja */
        .box.over {
            background-color: #e8f8f5;
            border-color: #1abc9c;
            transform: scale(1.02);
        }

        /* Estilos de tu foto */
        img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 50%; /* Hace la foto circular */
            cursor: grab;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
            transition: transform 0.2s;
        }

        img:active {
            cursor: grabbing;
            transform: scale(0.95);
        }

        .instrucciones {
            font-size: 18px;
            color: #34495e;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Escuela: CESBA</h1>
        <h2>Materia: Diseño de Interfaces</h2>
        <h3>Alumno: Emilio Garduño Servin</h3>
    </header>

    <p class="instrucciones">Arrastra tu foto desde la caja de "Origen" hacia la caja de "Destino".</p>

    <div class="drag-container">
        <div class="box" id="origen">
            <h4>Origen</h4>
            <img src="Emilio.jpeg" alt="Foto de Emilio" id="miFoto" draggable="true">
        </div>

        <div class="box" id="destino">
            <h4>Destino</h4>
        </div>
    </div>

    <script>
        /* ========================
           JAVASCRIPT (Funcionalidad)
           ======================== */
        const img = document.getElementById('miFoto');
        const destino = document.getElementById('destino');
        const origen = document.getElementById('origen');

        // 1. Cuando empezamos a arrastrar la imagen
        img.addEventListener('dragstart', (e) => {
            // Guardamos el ID del elemento que estamos moviendo
            e.dataTransfer.setData('text/plain', e.target.id);
            // Hacemos la imagen un poco transparente mientras se mueve
            setTimeout(() => {
                e.target.style.opacity = '0.4';
            }, 0);
        });

        // 2. Cuando soltamos la imagen (termina el arrastre)
        img.addEventListener('dragend', (e) => {
            e.target.style.opacity = '1';
        });

        // 3. Función para configurar las cajas para que acepten la imagen
        function configurarZonaDrop(zona) {
            // Permitir que algo se suelte aquí (por defecto el navegador no lo permite)
            zona.addEventListener('dragover', (e) => {
                e.preventDefault();
                zona.classList.add('over'); // Agrega el estilo verde de CSS
            });

            // Cuando la imagen sale de la zona
            zona.addEventListener('dragleave', () => {
                zona.classList.remove('over'); // Quita el estilo verde
            });

            // Cuando finalmente soltamos la imagen en la zona
            zona.addEventListener('drop', (e) => {
                e.preventDefault();
                zona.classList.remove('over');
                
                // Obtenemos el ID de la imagen que guardamos en 'dragstart'
                const id = e.dataTransfer.getData('text/plain');
                const elementoArrastrado = document.getElementById(id);
                
                // Agregamos la imagen a la nueva caja
                zona.appendChild(elementoArrastrado);
            });
        }

        // Aplicamos la configuración a ambas cajas para poder ir y venir
        configurarZonaDrop(destino);
        configurarZonaDrop(origen);

    </script>
</body>
</html>
